<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" fill="none">
  <rect width="300" height="240" fill="#16213e"/>
  <g transform="translate(150,110)" stroke="#6c63ff" stroke-width="2" fill="none" opacity="0.6">
    <!-- Gamepad body -->
    <rect x="-50" y="-25" width="100" height="50" rx="12"/>
    <!-- D-pad -->
    <line x1="-30" y1="-8" x2="-30" y2="8"/>
    <line x1="-38" y1="0" x2="-22" y2="0"/>
    <!-- Buttons -->
    <circle cx="25" cy="-6" r="5"/>
    <circle cx="35" cy="4" r="5"/>
  </g>
  <text x="150" y="160" text-anchor="middle" fill="#6c63ff" font-family="sans-serif" font-size="14" opacity="0.6">No Image</text>
</svg>
